name: Manual Video Generation

permissions:
  contents: read
  issues: write

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Video prompt'
        required: false
        default: ''
      num_clips:
        description: 'Number of clips (1-6)'
        required: false
        default: '3'
      host:
        description: 'Upload host (catbox or litterbox)'
        required: false
        default: 'litterbox'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      
      - name: Install Dependencies
        run: npm install axios form-data
      
      - name: Generate Clips
        run: node scripts/generateClips.js "${{ inputs.prompt }}" ${{ inputs.num_clips }}
      
      - name: Upload Clips Info
        uses: actions/upload-artifact@v4
        with:
          name: clips-info
          path: |
            clips.json
            clips/

  merge:
    needs: generate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      
      - name: Download Clips Info
        uses: actions/download-artifact@v4
        with:
          name: clips-info
          path: .
      
      - name: Merge Videos
        run: |
          mkdir -p clips
          ls -v clips/clip_*.mp4 > concat.txt 2>/dev/null || ls -v clips/*.mp4 > concat.txt
          sed -i 's/^/file /' concat.txt
          cat concat.txt
          ffmpeg -y -f concat -safe 0 -i concat.txt -c copy merged_video.mp4
          ls -lh merged_video.mp4
      
      - name: Upload Merged Video
        uses: actions/upload-artifact@v4
        with:
          name: merged-video
          path: merged_video.mp4

  upload:
    needs: merge
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Dependencies
        run: npm install axios form-data
      
      - name: Download Video
        uses: actions/download-artifact@v4
        with:
          name: merged-video
          path: .
      
      - name: Check File
        run: |
          ls -lh merged_video.mp4
      
      - name: Upload to ${{ inputs.host || 'litterbox' }}
        id: upload
        run: |
          echo "Uploading video to ${{ inputs.host }}..."
          ls -lh merged_video.mp4
          
          if [ "${{ inputs.host }}" = "litterbox" ]; then
            echo "Using Litterbox API"
            curl -s -F 'reqtype=fileUpload' -F 'time=72h' -F "fileToUpload=@merged_video.mp4" "https://litterbox.catbox.moe/resources/internals/api.php" > upload_response.txt
          else
            echo "Using Catbox API"
            curl -s -F 'reqtype=fileUpload' -F "fileToUpload=@merged_video.mp4" "https://catbox.moe/user/api.php" > upload_response.txt
          fi
          
          echo "---Response Start---"
          cat upload_response.txt
          echo "---Response End---"
          wc -c upload_response.txt
          
          # Check if response starts with https
          head -c 8 upload_response.txt > url_check.txt
          if grep -q "https:" url_check.txt; then
            cp upload_response.txt upload_url.txt
            echo "SUCCESS: Valid URL received"
          else
            echo "Check artifacts for video" > upload_url.txt
            echo "WARNING: Response doesn't start with https"
          fi
        continue-on-error: true
      
      - name: Get Upload URL
        id: get-url
        run: |
          echo "Reading URL:"
          cat upload_url.txt
          URL=$(cat upload_url.txt | tr -d '\n\r')
          echo "video_url=$URL" >> $GITHUB_OUTPUT
      
      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const prompt = '${{ inputs.prompt }}' || 'Random creative animation';
            const numClips = parseInt('${{ inputs.num_clips }}') || 3;
            const host = '${{ inputs.host }}' || 'litterbox';
            
            const videoUrl = '${{ steps.get-url.outputs.video_url }}' || 'Pending upload - check artifacts';
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `AI Video - ${new Date().toLocaleDateString()}`,
              body: `## AI Video Generated\n\n**Prompt:** ${prompt}\n**Clips:** ${numClips} x 10s = ${numClips * 10}s\n**Type:** Ken Burns Animation Effect\n**Host:** ${host}\n**Video URL:** ${videoUrl}\n\n---\n*Generated by AI Video Automation (Open Source)*`
            });
      
      - name: Summary
        run: |
          echo "## Video Generated Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Prompt | ${{ inputs.prompt || 'Random' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Duration | ${{ inputs.num_clips || 3 }} x 10s |" >> $GITHUB_STEP_SUMMARY
          echo "| Effect | Ken Burns Animation |" >> $GITHUB_STEP_SUMMARY
          echo "| Host | ${{ inputs.host || 'litterbox' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Video URL** | **${{ steps.get-url.outputs.video_url }}** |" >> $GITHUB_STEP_SUMMARY
