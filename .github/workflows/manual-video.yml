name: Manual Video Generation

permissions:
  contents: read
  issues: write

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Video prompt'
        required: false
        default: ''
      num_clips:
        description: 'Number of clips (1-6)'
        required: false
        default: '3'
      host:
        description: 'Upload host (catbox or litterbox)'
        required: false
        default: 'litterbox'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      
      - name: Install Dependencies
        run: npm install axios form-data
      
      - name: Generate Clips
        run: node scripts/generateClips.js "${{ inputs.prompt }}" ${{ inputs.num_clips }}
      
      - name: Upload Clips Info
        uses: actions/upload-artifact@v4
        with:
          name: clips-info
          path: |
            clips.json
            clips/

  merge:
    needs: generate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      
      - name: Download Clips Info
        uses: actions/download-artifact@v4
        with:
          name: clips-info
          path: .
      
      - name: Merge Videos
        run: |
          mkdir -p clips
          ls -v clips/clip_*.mp4 > concat.txt 2>/dev/null || ls -v clips/*.mp4 > concat.txt
          sed -i 's/^/file /' concat.txt
          cat concat.txt
          ffmpeg -y -f concat -safe 0 -i concat.txt -c copy merged_video.mp4
          ls -lh merged_video.mp4
      
      - name: Upload Merged Video
        uses: actions/upload-artifact@v4
        with:
          name: merged-video
          path: merged_video.mp4

  upload:
    needs: merge
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Dependencies
        run: npm install axios form-data
      
      - name: Download Video
        uses: actions/download-artifact@v4
        with:
          name: merged-video
          path: .
      
      - name: Check File
        run: |
          ls -lh merged_video.mp4
      
      - name: Upload to ${{ inputs.host || 'litterbox' }}
        id: upload
        run: |
          echo "Uploading video to ${{ inputs.host || 'litterbox' }}..."
          node scripts/upload.js ${{ inputs.host || 'litterbox' }} merged_video.mp4 > upload_result.txt 2>&1 || true
          cat upload_result.txt
          
          URL=$(grep "^URL=" upload_result.txt | cut -d'=' -f2)
          echo "EXTRACTED_URL=$URL" >> $GITHUB_ENV
          echo "url=$URL" >> $GITHUB_OUTPUT
          
          if [ -z "$URL" ] || [ "$URL" == "null" ]; then
            echo "Using GitHub artifact URL as fallback"
            echo "url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT
          fi
      
      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const url = process.env.EXTRACTED_URL;
            const prompt = '${{ inputs.prompt }}' || 'Random creative animation';
            const numClips = parseInt('${{ inputs.num_clips }}') || 3;
            const host = '${{ inputs.host }}' || 'litterbox';
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `AI Video - ${new Date().toLocaleDateString()}`,
              body: `## AI Video Generated\n\n**Prompt:** ${prompt}\n**Clips:** ${numClips} x 10s = ${numClips * 10}s\n**Type:** Ken Burns Animation Effect\n**Host:** ${host}\n**URL:** ${url}\n\n---\n*Generated by AI Video Automation (Open Source)*`
            });
      
      - name: Summary
        run: |
          echo "## Video Generated Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Prompt | ${{ inputs.prompt }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Duration | ${{ inputs.num_clips || 3 }} x 10s = $((${{ inputs.num_clips || 3 }} * 10))s |" >> $GITHUB_STEP_SUMMARY
          echo "| Effect | Ken Burns Animation |" >> $GITHUB_STEP_SUMMARY
          echo "| Host | ${{ inputs.host }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Video URL** | **${process.env.EXTRACTED_URL || 'N/A'}** |" >> $GITHUB_STEP_SUMMARY
